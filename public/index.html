<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">Save It</div>
    <div class="nav-links">
      <a href="/" class="active">Dashboard</a>
      <a href="/positivity">✨ Positivity</a>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <main class="container">

    ```
    <!-- Header + Range Toggle -->
    <div class="page-header">
      <h1>Your Spending</h1>
      <div class="toggle-group">
        <button class="toggle-btn active" data-range="week">This Week</button>
        <button class="toggle-btn" data-range="month">This Month</button>
      </div>
    </div>

    <!-- Pie Chart -->
    <section class="card chart-card">
      <canvas id="pieChart"></canvas>
      <p id="no-data-msg" class="no-data hidden">Add transactions to see your spending breakdown</p>
    </section>

    <!-- Spending Breakdown List -->
    <section class="card">
      <h2>Breakdown</h2>
      <ul id="transaction-list" class="transaction-list"></ul>
    </section>

    <!-- Add Transaction Form -->
    <section class="card">
      <h2>Add Transaction</h2>
      <div class="form-group">
        <input type="text" id="title" placeholder="e.g. Groceries" />
        <input type="number" id="amount" placeholder="Amount ($)" min="0" step="0.01" />
        <select id="category">
          <option value="">Select category</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills">Bills</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="date" />
        <button id="add-btn" class="btn-primary">Add Transaction</button>
      </div>
    </section>
    ```

  </main>

  <script src="/js/dashboard.js"></script>

  <script>
    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }
  </script>

</body>

</html>
