<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendWise — Register</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-brand">💸 SpendWise</div>
    <h1 class="auth-title">Create account</h1>

    <div id="error-msg" class="error-msg hidden"></div>

    <div class="form-group">
      <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
      <input type="password" id="password" placeholder="Password (min 6 characters)" autocomplete="new-password" />
      <button id="register-btn" class="btn-primary">Create Account</button>
    </div>

    <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
  </div>

  <script>
    document.getElementById('register-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');

      errorEl.classList.add('hidden');

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json();
        errorEl.textContent = data.error;
        errorEl.classList.remove('hidden');
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('register-btn').click();
    });
  </script>
</body>
</html>
